name: Actualizar y Desplegar

on:
  push:
    branches:
      - main
  # Permite ejecutar el workflow manualmente
  workflow_dispatch:

# Permisos necesarios para subir cambios y desplegar en GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Evita despliegues simultáneos
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Descargar el código
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      
      # 2. Instalar Node.js
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # 3. Generar data.json actualizado
      - name: Generar data.json
        run: node generar-data.js
      
      # 4. Commit y push si hay cambios en data.json
      - name: Guardar cambios en data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data.json
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Actualizar data.json automáticamente"
            git push
          else
            echo "No hay cambios en data.json"
          fi

      # 5. Configurar GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 6. Subir archivos como artefacto para despliegue
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # 7. Desplegar en GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

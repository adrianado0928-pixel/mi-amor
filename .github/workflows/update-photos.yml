name: Actualizar fotos automáticamente

# Este workflow se ejecuta cuando:
# 1. Se hace push a la rama main
# 2. Y hay cambios en la carpeta fotos/
on:
  push:
    branches:
      - main
    paths:
      - 'fotos/**'

jobs:
  update-data:
    runs-on: ubuntu-latest
    # Permisos necesarios para que GitHub Actions pueda hacer push al repositorio
    permissions:
      contents: write
    
    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      
      # 2. Instalar Node.js
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # 3. Ejecutar el script generador
      - name: Generar data.json
        run: node generar-data.js
      
      # 4. Hacer commit y push de los cambios (solo si hay cambios)
      - name: Commit y push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data.json

          # Verificar si hay cambios antes de hacer commit
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Actualizar data.json automáticamente"
            git push
          else
            echo "No hay cambios en data.json que necesiten actualización."
          fi

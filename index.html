<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-J7RS33WWCD"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-J7RS33WWCD');
    </script>

    <!-- importmap: es un diccionario que le dice al navegador desde dónde descargar cada librería.
         Cuando el código JavaScript pida 'three' o 'three/addons/...', el navegador sabe
         exactamente a qué URL ir a buscarlo. Sin esto, tendríamos que poner URLs largas en cada archivo. -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
        }
    }
    </script>

    <!-- Meta charset: le dice al navegador que usemos caracteres en español (acentos, ñ, etc.) -->
    <meta charset="UTF-8">

    <!-- Viewport: esto hace que la página se vea bien en móviles y tablets, no solo en ordenador -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título: esto es lo que aparece en la pestaña del navegador -->
    <title>Eres mi mundo michica</title>

    <!-- Iconos y Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/android-chrome-512x512.png">

    <!-- Google Fonts: cargamos la fuente Courgette desde Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courgette&display=swap" rel="stylesheet">

    <!-- Esto conecta nuestro archivo style.css con esta página. Sin esta línea, el CSS no funcionaría -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contador.css">
    <link rel="stylesheet" href="lunas.css">

    <!-- Elemento invisible para forzar la carga de la fuente "Courgette" inmediatamente -->
    <div style="font-family: 'Courgette', cursive; opacity: 0; position: absolute; pointer-events: none; z-index: -1;">.
    </div>
</head>

<body>
    <!-- PANTALLA DE CARGA -->
    <div id="loader-pantalla">
        <div id="loader-contenido">
            <div id="corazon-loader">
                <svg viewBox="0 0 32 32" width="100" height="100">
                    <path
                        d="M16,28.261c0,0-14-7.926-14-17.046c0-9.356,13.159-10.399,14,0.454c0.841-10.853,14-9.81,14-0.454 C30,20.335,16,28.261,16,28.261z"
                        fill="#ff0000" />
                </svg>
            </div>
            <div id="barra-carga-container">
                <div id="barra-carga-progreso"></div>
            </div>
            <p id="texto-carga">Cargando...</p>
        </div>
    </div>

    Ahora mismo está vacío, pero ya tiene su lugar reservado -->
    <div id="container"></div>

    <!-- VISOR DE FOTOS -->
    <!-- Este overlay aparece cuando haces clic en una foto del planeta -->
    <div id="visor-fotos" class="visor-oculto">
        <!-- Fondo oscuro semi-transparente -->
        <div id="visor-fondo"></div>

        <!-- Contenedor del contenido del visor -->
        <div id="visor-contenido">

            <!-- Título de la foto -->
            <h2 id="visor-titulo"></h2>

            <!-- Contenedor de la foto con efecto flip (voltear) -->
            <div id="foto-flip-container">
                <div id="foto-flip-inner">
                    <!-- Cara frontal: la imagen -->
                    <div id="foto-frente">
                        <img id="visor-imagen" src="" alt="Foto">
                    </div>

                    <!-- Cara trasera: la descripción -->
                    <div id="foto-reverso">
                        <div id="reverso-contenido">
                            <p id="visor-fecha"></p>
                            <p id="visor-descripcion"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Contador de fotos -->
            <p id="visor-contador"></p>
        </div>
    </div>

    <!-- CONTADOR DE DÍAS JUNTOS -->
    <div id="contador-dias" class="contador-oculto">
        <div id="contador-contenido">
            <span id="contador-corazon">❤️</span>
            <div id="contador-principal">
                <span id="contador-numero">0</span>
                <span id="contador-label">días juntos</span>
            </div>
            <div id="contador-separador"></div>
            <div id="contador-extras"></div>
        </div>
    </div>

    <!-- BOTÓN BÓVEDA DE LOS ANILLOS -->
    <button id="btn-boveda">
        <span class="btn-icono">💍</span>
        <span class="btn-label">Certificado</span>
    </button>

    <!-- BOTÓN SISTEMA SOLAR -->
    <button id="btn-vista-mapa">
        <span class="btn-icono">🌌</span>
        <span class="btn-label">Sistema Solar</span>
    </button>

    <!-- BOTÓN VOLVER (unificado para lunas y bóveda) -->
    <button id="btn-volver-mapa">
        <span>← Volver</span>
    </button>

    <!-- PANEL INFO DE LUNA (hover/clic en modo mapa) -->
    <div id="panel-luna-info">
        <p class="luna-info-titulo"></p>
        <p class="luna-info-subtitulo"></p>
        <p class="luna-info-fotos"></p>
    </div>

    <!-- FLECHAS DE NAVEGACIÓN DEL MAPA (solo en modo mapa) -->
    <div class="mapa-flecha" id="flecha-arriba"></div>
    <div class="mapa-flecha" id="flecha-abajo"></div>
    <div class="mapa-flecha" id="flecha-izq"></div>
    <div class="mapa-flecha" id="flecha-der"></div>

    <!-- Este es donde conectamos nuestro script.js.
         type="module" le dice al navegador que este script usa el sistema de módulos moderno,
         lo cual necesitamos para poder importar Three.js y OrbitControls correctamente -->
    <script type="module" src="script.js"></script>
    <script src="contador.js"></script>
    <script src="hitos.js"></script>
</body>

</html>
